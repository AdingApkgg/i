# Production stack for alice. Built image, no source mounts.
#
#   cp .env.example .env   # set real BETTER_AUTH_SECRET / passwords
#   docker compose -f compose.prod.yaml up -d --build
#
# A bundled nginx is the single entry; it routes same-origin:
#   /  -> web (Next handles /api/trpc, /api/auth, /dash internally)
# Only the proxy publishes a host port (127.0.0.1); front it with a cf tunnel.

name: iv2-prod

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-i}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-i}
      POSTGRES_DB: ${POSTGRES_DB:-i}
    volumes:
      - pgdata:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-i} -d ${POSTGRES_DB:-i}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set a strong MinIO password}
    volumes:
      - minio:/data
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: bun run --filter @i/db db:push
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://i:i@db:5432/i}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    image: iv2-prod-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      tags:
        - iv2-prod-web:latest
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL-}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgres://i:i@db:5432/i}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set a real 32+ char secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set the public origin}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?set the public origin}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set a strong MinIO password}
      S3_BUCKET: ${S3_BUCKET:-gallery}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${PROXY_PORT:-8099}:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  minio:
