name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # .cargo/config.toml forces the clang+mold linker on linux — install them
      # so clippy/test (which link build scripts + test binaries) succeed.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold clang
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all

  frontend:
    name: Bun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # Persist the Turborepo FS cache between runs so unchanged apps are skipped.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # turbo runs web + admin in parallel and reuses .turbo cache hits.
      - run: bun run build --concurrency=100%
      - run: bun run typecheck --concurrency=100%
