# Self-contained reverse proxy for the prod stack. Single entry; all same-origin:
#   /              -> web   (front site)
#   /dash/         -> admin (built with basePath=/dash)
#   /api/ /health /openapi.json -> api
#
# Front this container's published port with the host's nginx/apache or a domain.

upstream web   { server web:3000; }
upstream admin { server admin:3001; }
upstream api   { server api:8080; }

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Admin CMS under /dash. Next basePath=/dash serves the page at /dash (no
    # trailing slash) and assets at /dash/_next/...; a prefix match routes both
    # /dash and /dash/* without forcing a trailing slash (which Next 308s back).
    location /dash { proxy_pass http://admin; }

    # Backend API (same-origin)
    location /api/ { proxy_pass http://api; }
    location = /health { proxy_pass http://api; }
    location = /openapi.json { proxy_pass http://api; }

    # Front site
    location / { proxy_pass http://web; }
}
