# Single same-origin entry for the v2 stack. Next owns everything: pages,
# /api/trpc, /api/auth, and the /dash admin route group. Front this with a
# Cloudflare Tunnel pointing at 127.0.0.1:8099.

upstream web {
  server web:3000;
}

server {
  listen 80;
  server_name _;

  # Uploaded images can be large; allow generous bodies for /api/* (uploads).
  client_max_body_size 32m;

  # Security headers (defense in depth; cf can add more).
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  location / {
    proxy_pass http://web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }
}
