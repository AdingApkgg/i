# Dev stack. Host only needs Docker — Rust and Bun run inside containers,
# dependencies are fetched in-container and cached in named volumes.
#
#   cp .env.example .env && docker compose up
#
# Host ports are overridable (this machine may already use 5432/6379/8080):
#   API_PORT=18080 REDIS_PORT=16379 DB_PORT=15432 docker compose up
#
# api   -> http://localhost:${API_PORT:-8080}
# web   -> http://localhost:${WEB_PORT:-3000}
# admin -> http://localhost:${ADMIN_PORT:-3001}
# minio -> http://localhost:${MINIO_CONSOLE_PORT:-9001} (console)

name: i

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-i}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-i}
      POSTGRES_DB: ${POSTGRES_DB:-i}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # postgres:18 moved PGDATA into a version subdir; mount the parent dir.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-i} -d ${POSTGRES_DB:-i}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio:/data

  api:
    image: rust:1-bookworm
    working_dir: /app
    # On first start, install the toolchain accelerators (mold linker, clang
    # driver, sccache) into the shared cargo-bin volume so subsequent `up`s skip
    # it. .cargo/config.toml wires mold; RUSTC_WRAPPER below wires sccache.
    # apt-get only runs when the marker is absent (i.e. fresh cargo-bin volume).
    command: >
      bash -c '
      command -v mold >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends mold clang; };
      command -v sccache >/dev/null 2>&1 || { curl -fsSL https://github.com/mozilla/sccache/releases/download/v0.8.2/sccache-v0.8.2-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /tmp && install -m0755 /tmp/sccache-v0.8.2-x86_64-unknown-linux-musl/sccache /usr/local/cargo/bin/sccache; };
      exec cargo run -p api'
    # .env is optional: defaults below apply on a fresh clone. .env overrides them.
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://i:i@db:5432/i}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_BIND: ${API_BIND:-0.0.0.0:8080}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      RUST_LOG: ${RUST_LOG:-info,api=debug,tower_http=debug}
      CARGO_TERM_COLOR: always
      # Compiler cache: warm rebuilds after a source edit reuse cached crates.
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: /sccache
      # sccache cannot cache incremental builds; .cargo + profile disable it, and
      # we belt-and-suspenders it here so the wrapper always gets cache hits.
      CARGO_INCREMENTAL: "0"
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-target:/app/target
      # Persisted compiler cache — the key to near-instant warm rebuilds.
      - sccache:/sccache
      # Persist installed sccache/cargo-installed bins across container restarts.
      - cargo-bin:/usr/local/cargo/bin
    healthcheck:
      # bash /dev/tcp probe (curl isn't in rust:1-bookworm). Generous start_period
      # so the first (multi-minute) cold cargo build doesn't show as unhealthy.
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 600s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # One-shot: installs JS deps into the shared node_modules volume, then exits.
  # bun-cache persists bun's global install cache across recreates, so a fresh
  # `up` (even after `down`) re-links from cache instead of re-downloading from
  # the registry. --frozen-lockfile keeps the volume in sync with bun.lock.
  install:
    image: oven/bun:1
    working_dir: /app
    command: bun install --frozen-lockfile
    environment:
      BUN_INSTALL_CACHE_DIR: /bun-cache
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - bun-cache:/bun-cache

  web:
    image: oven/bun:1
    working_dir: /app
    command: bun run --filter web dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      install:
        condition: service_completed_successfully

  admin:
    image: oven/bun:1
    working_dir: /app
    command: bun run --filter admin dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      install:
        condition: service_completed_successfully

volumes:
  pgdata:
  minio:
  cargo-registry:
  cargo-target:
  sccache:
  cargo-bin:
  node_modules:
  # bun's global install cache — persists registry tarballs across recreates.
  bun-cache:
