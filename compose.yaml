# Dev stack. Host only needs Docker + this repo; bun runs in-container.
#
#   cp .env.example .env && docker compose up
#
# Host ports are overridable (this machine already uses 5432/6379/3000/9000):
#   WEB_PORT=13000 DB_PORT=15432 REDIS_PORT=16379 docker compose up
#
# web -> http://localhost:${WEB_PORT:-3000}

name: iv2

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-i}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-i}
      POSTGRES_DB: ${POSTGRES_DB:-i}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-i} -d ${POSTGRES_DB:-i}"]
      interval: 3s
      timeout: 3s
      retries: 20
      # postgres init briefly restarts (temp server → create db → real server);
      # don't count that window as failures.
      start_period: 40s

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio:/data

  web:
    image: oven/bun:1
    working_dir: /app
    # First boot installs deps into the shared volume, generates the Prisma
    # client, pushes the schema to Postgres, then runs the Next dev server.
    command: >
      bash -lc '
      bun install &&
      bun run --filter @i/db db:generate &&
      bun run --filter @i/db db:push &&
      (bun run --filter @i/db db:seed || true) &&
      bun run --filter @i/web dev'
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://i:i@db:5432/i}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me-32-chars-or-more}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio12345}
      S3_BUCKET: ${S3_BUCKET:-gallery}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  minio:
  node_modules:
  web_next:
